<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tom Cannon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --accent: #c8a96e;
      --text: #e8e2d9;
      --muted: #6b6560;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.02em;
    }

    /* subtle grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,169,110,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,169,110,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    main {
      text-align: center;
      padding: 3rem 2rem;
      animation: fadeUp 0.9s ease both;
    }

    .eyebrow {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-weight: 400;
      line-height: 1.05;
      color: var(--text);
    }

    .rule {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin: 1.8rem auto;
    }

    .tagline {
      color: var(--muted);
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      margin-bottom: 2.5rem;
    }

    nav {
      display: flex;
      gap: 2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    nav a {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      padding-bottom: 2px;
      transition: border-color 0.2s;
    }

    nav a:hover { border-color: var(--accent); }

    footer {
      position: fixed;
      bottom: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      animation: fadeUp 1.2s 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">tomcannon.com</p>
    <h1>Tom Cannon</h1>
    <div class="rule"></div>
    <p class="tagline">Coming soon</p>
    <nav>
      <a href="/gundam">GundamBase ↗</a>
      <a href="https://bitwerks.mobi">Bitwerks ↗</a>
    </nav>
  </main>
  <footer>&copy; 2026 Tom Cannon</footer>
</body>
</html>
